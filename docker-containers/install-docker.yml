- name: Install Docker
  hosts: all
  remote_user: ubuntu
  gather_facts: true
  become: true

  tasks:
    - name: Update package index
      apt:
        update_cache: yes

    - name: Install packages to allow apt to use a repository over HTTPS
      apt:
        name: "{{ item }}"
        cache_valid_time: 3600
      with_items:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg
        - lsb-release

    - name: Add Docker's official GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker's APT repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['lsb']['codename'] }} stable"
        state: present

    - name: Install Docker & Docker Compose
      apt:
        name: "{{ item }}"
        state: present
      with_items:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-compose

    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Check Docker service status
      command: systemctl status docker --no-pager
      register: docker_status
      changed_when: false

    - name: Print Docker service status
      when: docker_status.rc == 0
      debug:
        msg: "Docker service status: {{ docker_status.stdout }}"

